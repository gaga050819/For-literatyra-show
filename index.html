<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Турнірна таблиця</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f9; padding: 20px; }
        .leaderboard { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .player { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #ddd; font-size: 18px; }
        .player:nth-child(1) { font-weight: bold; color: #d4af37; font-size: 22px; } /* Золото для лідера */
    </style>
</head>
<body>

    <div class="leaderboard">
        <h2>Результати в реальному часі</h2>
        <div id="players-list">Очікування гравців...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // ВСТАВ ТОЙ САМИЙ ФАЙРБЕЙЗ КОНФІГ СЮДИ
        const firebaseConfig = {
            apiKey: "ТВІЙ_API_KEY",
            authDomain: "ТВІЙ_ПРОЄКТ.firebaseapp.com",
            databaseURL: "https://ТВІЙ_ПРОЄКТ-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "ТВІЙ_ПРОЄКТ",
            storageBucket: "ТВІЙ_ПРОЄКТ.appspot.com",
            messagingSenderId: "ТВІЙ_ID",
            appId: "ТВІЙ_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // onValue спрацьовує щоразу, коли хтось натискає радіокнопку в тесті
        onValue(ref(db, 'users'), (snapshot) => {
            const listDiv = document.getElementById('players-list');
            listDiv.innerHTML = '';
            const users = [];

            snapshot.forEach((childSnapshot) => {
                users.push(childSnapshot.val());
            });

            // Сортуємо гравців від найбільшого бала до найменшого
            users.sort((a, b) => b.score - a.score);

            users.forEach(user => {
                const div = document.createElement('div');
                div.className = 'player';
                // Показуємо статус (Грає / Завершив)
                const status = user.played ? "(Завершив)" : "⏳";
                div.innerHTML = `<span>${user.name} ${status}</span> <span>${user.score} балів</span>`;
                listDiv.appendChild(div);
            });
        });
    </script>
</body>
</html>
